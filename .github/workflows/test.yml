# Terraform Provider testing workflow.
name: Tests

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  # Compile, lint, and run unit tests. Acceptance tests (TF_ACC) are NOT run in
  # CI because they require a live SigNoz instance, which is network-restricted;
  # run `make testacc` locally against a reachable SigNoz instead.
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v ./...
      - run: go test -v -cover ./...
      - name: Run linters
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Verify generated docs are in sync with schema + examples.
  generate:
    name: Docs Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Docs out of sync. Run 'make generate' and commit."; exit 1)
